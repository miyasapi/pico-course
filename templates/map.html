<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Japan Map IoT</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
}

#map {
    width: 100%;
    height: 100vh;
}

.leaflet-tooltip.my-label {
    background: rgba(255, 255, 255, 0.9);
    border: 1px solid #666;
    border-radius: 6px;
    box-shadow: 1px 1px 4px rgba(0,0,0,0.2);
    color: #000;
    font-size: 14px;
    font-weight: bold;
    padding: 4px 8px;
}

.leaflet-tooltip.my-label:before {
    display: none;
}
</style>
</head>

<body>
<div id="map"></div>

<script>
var map = L.map('map').setView([36.0, 138.0], 5);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

let markers = [];

async function loadData() {
    try {
        let res = await fetch("/data");
        let data = await res.json();

        markers.forEach(m => map.removeLayer(m));
        markers = [];

        data.forEach(d => {
            if (d.lat == null || d.lng == null) return;

            let marker = L.marker([d.lat, d.lng]).addTo(map);

            marker.bindPopup(
                "<b>" + (d.name || "No Name") + "</b><br>" +
                "温度: " + (d.temp ?? "-") + " ℃<br>" +
                "湿度: " + (d.hum ?? "-") + " %<br>" +
                "気圧: " + (d.pres ?? "-") + " hPa"
            );

            marker.bindTooltip(
                (d.temp ?? "-") + "℃ / " + (d.hum ?? "-") + "%",
                {
                    permanent: true,
                    direction: "top",
                    offset: [0, -10],
                    className: "my-label"
                }
            ).openTooltip();

            markers.push(marker);
        });
    } catch (e) {
        console.log("loadData error:", e);
    }
}

loadData();
setInterval(loadData, 5000);
</script>
</body>
</html>
